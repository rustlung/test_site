events {}

http {
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Редирект с HTTP на HTTPS
    server {
        listen 80;
        server_name vsigaev.ru www.vsigaev.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name vsigaev.ru www.vsigaev.ru;

        ssl_certificate /etc/letsencrypt/live/vsigaev.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vsigaev.ru/privkey.pem;

        location / {
            if ($request_uri ~* "^/pgadmin") {
              return 403;
 	}
            set $frontend rp_frontend;
            proxy_pass http://$frontend:80;
            proxy_set_header Host $host;
        } 

        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://rp_backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v2/ {
	    return 403;
        }
	
	location ^~ /pgadmin/ {
 	    return 403;
	}
    }
}
