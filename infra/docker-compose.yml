services:

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rp_frontend
    restart: unless-stopped
    networks:
      - internal
      
  nginx:
    image: nginx:alpine
    container_name: rp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: rp_postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  pgadmin:
    image: dpage/pgadmin4
    container_name: rp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      SCRIPT_NAME: /pgadmin
    networks:
      - internal
    depends_on:
      - postgres

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rp_backend
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    depends_on:
      - postgres

  registry:
    image: registry:2
    container_name: rp_registry
    restart: unless-stopped
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - internal

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: rp_watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.53
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30
    networks:
      - internal

volumes:
  postgres_data:
  registry_data:

networks:
  internal:
    driver: bridge
